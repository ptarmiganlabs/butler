name: butler-log-monitor
on:
    schedule:
        # Run twice daily at 08:00 and 20:00 UTC
        - cron: '0 8,20 * * *'
    workflow_dispatch: # Allow manual triggering for testing

permissions: {}

jobs:
    monitor-logs:
        runs-on: ${{ vars.BUTLER_INSIDER_DEPLOY_RUNNER || 'host2-win' }}
        env:
            BUTLER_INSIDER_SERVICE_NAME: ${{ vars.BUTLER_INSIDER_SERVICE_NAME || 'Butler insiders build' }}
            BUTLER_INSIDER_DEPLOY_PATH: ${{ vars.BUTLER_INSIDER_DEPLOY_PATH || 'C:\butler-insider' }}
            SMTP_SERVER: ${{ vars.SMTP_SERVER }}
            SMTP_PORT: ${{ vars.SMTP_PORT || '587' }}
            EMAIL_FROM: ${{ vars.EMAIL_FROM }}
            EMAIL_TO: ${{ vars.EMAIL_TO }}
            SERVER_NAME: ${{ vars.SERVER_NAME || 'Butler Insider Server' }}
            SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
            SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
            BUTLER_MONITOR_SCRIPT_DIR: ${{ vars.BUTLER_MONITOR_SCRIPT_DIR || 'D:\tools\scripts\insiders-build-monitor' }}

        steps:
            - name: Check Butler log files for errors
              id: monitor-logs
              shell: powershell
              continue-on-error: false
              env:
                  BUTLER_INSIDER_SERVICE_NAME: ${{ vars.BUTLER_INSIDER_SERVICE_NAME || 'Butler insiders build' }}
                  BUTLER_INSIDER_DEPLOY_PATH: ${{ vars.BUTLER_INSIDER_DEPLOY_PATH || 'C:\butler-insider' }}
                  SERVER_NAME: ${{ vars.SERVER_NAME || 'Butler Insider Server' }}
              run: ./scripts/monitor-butler-logs.ps1

            - name: Stop Butler service if errors found
              id: stop-service
              if: steps.monitor-logs.outputs.errors_found == 'true'
              shell: powershell
              continue-on-error: true
              env:
                  BUTLER_INSIDER_SERVICE_NAME: ${{ vars.BUTLER_INSIDER_SERVICE_NAME || 'Butler insiders build' }}
              run: ./scripts/stop-butler-service.ps1

            - name: Send error alert email
              id: send-email
              if: steps.monitor-logs.outputs.errors_found == 'true'
              shell: powershell
              continue-on-error: true
              run: ./scripts/send-butler-error-email.ps1
