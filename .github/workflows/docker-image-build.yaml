# This workflow will do a clean install of node dependencies, build the source code and run tests across different versions of node
# For more information see: https://help.github.com/actions/language-and-framework-guides/using-nodejs-with-github-actions

# Inspiration
# https://github.com/actions/starter-workflows/blob/main/ci/docker-publish.yml

name: Docker image

on:
  workflow_dispatch:
    inputs:
      tags:
        description: 'Test scenario tags'
        required: false
  release:
    types:
      - published

permissions: {}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    if: |
      github.event_name != 'pull_request' &&
      github.repository_owner == 'ptarmiganlabs'

    steps:
      # - name: Send job status to MQTT (starting job)
      #   uses: potaesm/github-actions-mqtt-request@1.0.0
      #   if: always()
      #   env:
      #     JOB_CONCLUSION: ${{ job.status }}
      #     NODE_VERSION: ${{ matrix.node }}
      #   with:
      #     url: ${{ secrets.PUBLIC_MQTT_BROKER_URL }}
      #     topic: control/github_actions_action_runner
      #     payload: '{ "type":"ci-test", "repo": "${{ github.repository }}", "job": "${{ github.job }}", "workflow": "${{ github.workflow }}", "nodeVersion": "${{ env.NODE_VERSION }}","status": "in_progress","conclusion":"${{ env.JOB_CONCLUSION }}" }'
      #     username: ${{ secrets.PUBLIC_MQTT_BROKER_USER }}
      #     connectTimeout: 30000

      - name: Show input values
        if: |
          github.event_name != 'pull_request' &&
          github.repository_owner == 'ptarmiganlabs'
        env:
          GITHUB_INPUTS: ${{ toJSON(github.event.inputs) }}
        run: |
          echo "Inputs: $GITHUB_INPUTS"

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        if: |
          github.event_name != 'pull_request' &&
          github.repository_owner == 'ptarmiganlabs'
        with:
          persist-credentials: false

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0
        if: |
          github.event_name != 'pull_request' &&
          github.repository_owner == 'ptarmiganlabs'

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
        if: |
          github.event_name != 'pull_request' &&
          github.repository_owner == 'ptarmiganlabs'

      # Login against a Docker registry except on PR
      # https://github.com/marketplace/actions/docker-login
      # https://docs.github.com/en/actions/reference/context-and-expression-syntax-for-github-actions#github-context
      - name: Login to Docker Hub
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        if: |
          github.event_name != 'pull_request' &&
          github.repository_owner == 'ptarmiganlabs'
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Docker tag has format: refs/tags/v1.2.3
      # We need to extract the tag semver from the full tag
      # Store the tag in GITHUB_ENV environment variable
      - name: Create clean tag for Docker
        env:
          GITHUB_REF: ${{ github.ref }}
        run: |
          export TAG=$(echo "$GITHUB_REF" | grep -oE "[0-9]+\.[0-9]+\.[0-9]+")
          echo "TAG=$TAG" >> $GITHUB_ENV
          #
          # Debug
          # echo "TAG=$TAG"
          echo "GITHUB_ENV=$GITHUB_ENV"
          # export TAGTMP2=${TAGTMP1##*/}
          # export TAG=${TAGTMP2##*-}
          # echo "TAG=$TAG" >> $GITHUB_ENV

      - name: Dump GitHub context (DEBUG - disabled)
        if: false  # was: always()
        env:
          GITHUB_CONTEXT: ${{ toJSON(github) }}
        run: echo "$GITHUB_CONTEXT"
      - name: Dump job context (DEBUG - disabled)
        if: false  # was: always()
        env:
          JOB_CONTEXT: ${{ toJSON(job) }}
        run: echo "$JOB_CONTEXT"
      - name: Dump steps context (DEBUG - disabled)
        if: false  # was: always()
        env:
          STEPS_CONTEXT: ${{ toJSON(steps) }}
        run: echo "$STEPS_CONTEXT"
      - name: Dump runner context (DEBUG - disabled)
        if: false  # was: always()
        env:
          RUNNER_CONTEXT: ${{ toJSON(runner) }}
        run: echo "$RUNNER_CONTEXT"
      - name: Dump strategy context (DEBUG - disabled)
        if: false  # was: always()
        env:
          STRATEGY_CONTEXT: ${{ toJSON(strategy) }}
        run: echo "$STRATEGY_CONTEXT"

      # Extract metadata (tags, labels) for Docker
      # https://github.com/marketplace/actions/docker-metadata-action
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@030e881283fb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        if: |
          github.event_name != 'pull_request' &&
          github.repository_owner == 'ptarmiganlabs'
        with:
          # images: ${{ env.IMAGE_NAME }}
          images: ${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}},value=${{ env.TAG }}
            type=semver,pattern={{major}}.{{minor}},value=${{ env.TAG }}
            type=semver,pattern={{major}},value=${{ env.TAG }}

      - name: Show Docker tags that will be used
        if: |
          github.event_name != 'pull_request' &&
          github.repository_owner == 'ptarmiganlabs'
        env:
          DOCKER_TAGS: ${{ steps.meta.outputs.tags }}
        run: echo "$DOCKER_TAGS"

      - name: Show Docker labels that will be used
        if: |
          github.event_name != 'pull_request' &&
          github.repository_owner == 'ptarmiganlabs'
        env:
          DOCKER_LABELS: ${{ steps.meta.outputs.labels }}
        run: echo "$DOCKER_LABELS"

      - name: Build and push
        id: docker_build
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        if: |
          github.event_name != 'pull_request' &&
          github.repository_owner == 'ptarmiganlabs'
        with:
          context: .
          platforms: |
            linux/amd64
            linux/arm64
            linux/arm/v7
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Image digest
        if: |
          github.event_name != 'pull_request' &&
          github.repository_owner == 'ptarmiganlabs'
        env:
          DOCKER_DIGEST: ${{ steps.docker_build.outputs.digest }}
        run: echo "$DOCKER_DIGEST"

      # Send MQTT message similar to this:
      # { "topic":"control/github_actions_action_runner",
      #   "payload":"{
      #     \"type\":\"docker-build\",
      #     \"repo\": \"ptarmiganlabs/butler\",
      #     \"job\": \"build\", \
      #     "workflow\": \"Build Docker image CI\",
      #     \"status\": \"completed\",
      #     \"conclusion\":\"success\"
      #   }"
      # }
      # - name: Send job status to MQTT when done
      #   uses: potaesm/github-actions-mqtt-request@1.0.0
      #   if: always()
      #   env:
      #     JOB_STATUS: ${{ job.status }}
      #   with:
      #     url: ${{ secrets.PUBLIC_MQTT_BROKER_URL }}
      #     topic: control/github_actions_action_runner
      #     payload: '{ "type":"docker-build", "repo": "${{ github.repository }}", "job": "${{ github.job }}", "workflow": "${{ github.workflow }}","status": "completed","conclusion":"${{ env.JOB_STATUS }}" }'
      #     username: ${{ secrets.PUBLIC_MQTT_BROKER_USER }}
      #     connectTimeout: 30000
