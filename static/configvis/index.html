<!doctype html>

<html lang="en">
    <head>
        <title>Butler</title>

        <link rel="stylesheet" href="jsontree.js.css" />
        <script src="jsontree.js"></script>
        <link rel="stylesheet" href="prism.css" />
        <script src="prism.js"></script>

        <style nonce="{{cspNonce}}">
            #header {
                display: flex;
                justify-content: space-between;
                align-items: center;
                position: fixed;
                top: 0;
                width: 100%;
                z-index: 1000;
                background-color: #fff; /* Add a background color to ensure text is readable */
            }
            #headerLeft {
                display: flex;
                align-items: center;
                width: 50%;
            }
            #headerRight {
                display: flex;
                align-items: center;
                width: 50%;
                text-align: right;
            }
            #logo,
            #pageTitle,
            #buttons {
                display: flex;
                align-items: center; /* Center align the contents of logo and buttons */
            }
            #logo {
                /* Ensure there's no right margin or padding that could push the title to the right */
                margin-right: 0;
                padding-right: 0;
            }
            #pageTitle h1 {
                text-align: left; /* Align the title to the left */
                margin: 0; /* Remove default margin */
                padding-left: 20px; /* Add some space between the logo and the title */
                font-size: 32px; /* Adjust font size as needed */
                font-family: Arial, sans-serif; /* Use Arial font */
            }
            #buttons {
                justify-content: flex-end;
            }
            #downloadYaml {
                font-size: 20px;
                padding: 10px;
                margin-right: 20px;
                background-color: #007bff; /* Blue background */
                color: white; /* White text */
                border: none; /* Remove border */
                cursor: pointer; /* Pointer cursor on hover */
                border-radius: 5px; /* Rounded corners */
                box-shadow: 0 4px #0056b3; /* Darker blue shadow for 3D effect */
                transition: all 0.3s; /* Smooth transition for press effect */
            }
            #downloadYaml:hover {
                background-color: #0056b3; /* Darker shade on hover */
                cursor: pointer; /* Change cursor to pointer to indicate it's clickable */
            }
            #downloadYaml:active {
                box-shadow: 0 2px #0056b3; /* Adjust shadow for pressed effect */
                transform: translateY(4px); /* Move button down to mimic press */
            }

            #download-icon {
                vertical-align: middle;
                margin-right: 5px;
                height: 32px;
                width: 32px;
            }

            #tree-1 {
                width: 100%;
                max-width: 100%;
            }

            body {
                padding-top: 100px; /* Add padding to the top of the body to prevent content from being hidden behind the fixed header */
            }

            /* Style the tab */
            .tab {
                overflow: hidden;
                border: 1px solid #ccc;
                background-color: #f1f1f1;
            }

            /* Style the buttons inside the tab */
            .tab button {
                background-color: inherit;
                float: left;
                border: none;
                outline: none;
                cursor: pointer;
                padding: 14px 16px;
                transition: 0.3s;
                font-size: 17px;
            }

            /* Change background color of buttons on hover */
            .tab button:hover {
                background-color: #ddd;
            }

            /* Create an active/current tablink class */
            .tab button.active {
                background-color: #ccc;
            }

            /* Style the tab content */
            .tabcontent {
                display: none;
                padding: 6px 12px;
                border: 1px solid #ccc;
                border-top: none;
            }

            /* Style for preformatted text */
            pre {
                background-color: #f4f4f4;
                border: 1px solid #ddd;
                padding: 10px;
                border-radius: 5px;
                overflow: auto;
            }
        </style>
    </head>

    <body>
        <div id="header">
            <div id="headerLeft">
                <div id="logo">
                    <a href="https://butler.ptarmiganlabs.com" target="_blank">
                        <img src="butler.png" alt="Butler logo" height="100px" />
                    </a>
                </div>
                <div id="pageTitle">
                    <h1>
                        Current Butler configuration (docs
                        <a href="https://butler.ptarmiganlabs.com/docs/reference/config-file/" target="_blank">here</a>)
                    </h1>
                </div>
            </div>
            <div id="headerRight">
                <div id="buttons">
                    <button id="downloadYaml">
                        <img
                            id="download-icon"
                            src="download-solid.svg"
                            alt="Download icon"
                        />
                        Download obfuscated YAML
                    </button>
                </div>
                <div class="tab">
                    <button id="tabBtnYaml" class="tablinks">YAML</button>
                    <button id="tabBtnJsonTree" class="tablinks">JSON tree view</button>
                </div>
            </div>
        </div>

        <div id="YAML" class="tabcontent">
            <h3>YAML configuration</h3>
            <pre class="line-numbers"><code class="language-yaml">{{butlerConfigYaml}}</code></pre>
        </div>

        <div id="JSONTree" class="tabcontent">
            <h3>JSON tree view</h3>
            <div id="tree-1" data-butler-config="{{butlerConfigJsonEncoded}}"></div>
            <script nonce="{{cspNonce}}">
                (function () {
                    var treeElement = document.getElementById('tree-1');
                    var data = JSON.parse(treeElement.getAttribute('data-butler-config'));
                    treeElement.setAttribute(
                        'data-jsontree-js',
                        JSON.stringify({
                            title: { show: false, showTreeControls: true, showCopyButton: true },
                            showCounts: true,
                            sortPropertyNames: false,
                            sortPropertyNamesInAlphabeticalOrder: false,
                            data: data,
                        }),
                    );
                })();
            </script>
        </div>

        <script nonce="{{cspNonce}}">
            function getYamlFromHandlebars() {
                try {
                    const yamlElement = document.querySelector('#YAML code');

                    if (!yamlElement) {
                        throw new Error('Could not find rendered YAML content in the page.');
                    }

                    return yamlElement.textContent;
                } catch (error) {
                    console.error('There was a problem getting YAML config data from the rendered page:', error);
                    return '';
                }
            }

            document.getElementById('downloadYaml').addEventListener('click', function () {
                var butlerConfigYaml = getYamlFromHandlebars();

                var blob = new Blob([butlerConfigYaml], { type: 'text/yaml' });
                var url = URL.createObjectURL(blob);

                var a = document.createElement('a');
                a.href = url;
                a.download = 'config.yaml';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            });

            function openTab(evt, tabName) {
                var i, tabcontent, tablinks;

                tabcontent = document.getElementsByClassName('tabcontent');
                for (i = 0; i < tabcontent.length; i++) {
                    tabcontent[i].style.display = 'none';
                }

                tablinks = document.getElementsByClassName('tablinks');
                for (i = 0; i < tablinks.length; i++) {
                    tablinks[i].className = tablinks[i].className.replace(' active', '');
                }

                document.getElementById(tabName).style.display = 'block';
                evt.currentTarget.className += ' active';
            }

            document.addEventListener('DOMContentLoaded', function () {
                document.getElementById('tabBtnYaml').addEventListener('click', function (event) {
                    openTab(event, 'YAML');
                });
                document.getElementById('tabBtnJsonTree').addEventListener('click', function (event) {
                    openTab(event, 'JSONTree');
                });
                document.getElementById('tabBtnYaml').click();
            });
        </script>
    </body>
</html>
